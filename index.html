<script>
const imagePrompts = [

"Anime style cyberpunk girl with neon city background, ultra detailed",

"Futuristic AI robot meditating in Himalayas, cinematic lighting"

"1 minute horror story that will shock you",

"You won’t believe this...",
"This changed my life forever",
"Stop scrolling! This is important"
];

function generatePrompt() {
    document.getElementById("result").innerText =
    imagePrompts[Math.floor(Math.random()*imagePrompts.length)];
}

function generateShorts() {
    document.getElementById("result").innerText =
    shortsIdeas[Math.floor(Math.random()*shortsIdeas.length)];
